# ============================================
# EXTERNAL CONFIGURATION
# ============================================
# All sensitive configuration (credentials, LDAP URLs, certificates, etc.) 
# is loaded from an external file: application-external.properties
#
# This keeps sensitive data out of the codebase and prevents accidental commits.
#
# To run the application, see: SETUP_GUIDE.md

# Load configuration from external file
# First try CONFIG_PATH environment variable, then fall back to ./config/
spring.config.import=optional:file:${CONFIG_PATH:./config/}application-external.properties

# Application name
spring.application.name=ad-users-demo
