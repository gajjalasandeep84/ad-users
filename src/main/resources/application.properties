# Load environment-specific configuration from external file
# Set CONFIG_PATH environment variable: C:\Workspaces\adUsersConfig\
spring.config.additional-location=file:${CONFIG_PATH:./config/}application-external.properties

# LDAP connection URL (using LDAPS on port 636)
spring.ldap.urls=${SPRING_LDAP_URLS}

# Use the domain root as the base
spring.ldap.base=${SPRING_LDAP_BASE}

# Broad search base (OU=HX only if you want to restrict users under HX)
spring.ldap.search.base=${SPRING_LDAP_SEARCH_BASE}

# Service account bind DN (verify the exact OU structure in AD)
spring.ldap.username=${LDAP_USERNAME}

# Escape special characters in password
spring.ldap.password=${LDAP_PASSWORD}

# SSL truststore settings (externalized)
spring.ldap.ssl.trust-store=file:${TRUSTSTORE_PATH}
spring.ldap.ssl.trust-store-password=${TRUSTSTORE_PASSWORD}
spring.ldap.ssl.trust-store-type=PKCS12

ldap.search.base=${LDAP_SEARCH_BASE}


# ===== TEST LDAP =====
ad.test.url=${AD_TEST_URL}
ad.test.base=${AD_TEST_BASE}
ad.test.searchBase=${AD_TEST_SEARCH_BASE}
ad.test.user=${LDAP_TEST_USER}
ad.test.pass=${LDAP_TEST_PASS}

# ===== PROD LDAP =====
ad.prod.url=${AD_PROD_URL}
ad.prod.base=${AD_PROD_BASE}
ad.prod.searchBase=${AD_PROD_SEARCH_BASE}
ad.prod.user=${LDAP_PROD_USER}
ad.prod.pass=${LDAP_PROD_PASS}